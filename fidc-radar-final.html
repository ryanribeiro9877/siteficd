<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FIDC Crédito Privado — Radar de Mercado</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a12;--surf:#0d1423;--s2:#111c2e;--s3:#162238;--bord:#1e2d47;--ac:#00d4ff;--ac2:#ff6b35;--ac3:#7cfc84;--ac4:#ffd166;--ac5:#ff4757;--text:#e8f0fe;--muted:#6b7fa3;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.018) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0;}

/* ═══ HEADER ═══ */
header{position:relative;z-index:10;padding:20px 18px 16px;border-bottom:1px solid var(--bord);background:linear-gradient(180deg,rgba(0,212,255,0.05) 0%,transparent 100%);}
.hrow{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;}
h1{font-family:'Syne',sans-serif;font-size:clamp(18px,5vw,28px);font-weight:800;background:linear-gradient(135deg,#00d4ff 0%,#7cfc84 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;}
.hsub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:4px;letter-spacing:.5px;}
.hstats{display:flex;gap:2px;flex-wrap:wrap;}
.hstat{background:var(--s2);border:1px solid var(--bord);padding:10px 14px;text-align:center;min-width:60px;}
.hstat:first-child{border-radius:10px 0 0 10px;}
.hstat:last-child{border-radius:0 10px 10px 0;}
.hstat-n{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--ac);display:block;line-height:1;}
.hstat-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-family:'DM Mono',monospace;margin-top:2px;}
.hpills{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;}
.pill{background:var(--s2);border:1px solid var(--bord);border-radius:20px;padding:4px 11px;font-size:10px;font-family:'DM Mono',monospace;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.pill.red{color:#ff6b6b;border-color:rgba(255,71,87,.35);}
.pill.yellow{color:#ffd166;border-color:rgba(255,209,102,.35);}
.dot-live{width:6px;height:6px;border-radius:50%;background:var(--ac3);animation:pulse 2s infinite;display:inline-block;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ═══ CONTROLS ═══ */
.controls{position:sticky;top:0;z-index:50;background:var(--surf);border-bottom:1px solid var(--bord);padding:10px 16px;display:flex;flex-direction:column;gap:9px;}
.crow{display:flex;gap:8px;align-items:center;}
.swrap{position:relative;flex:1;max-width:420px;}
.swrap input{width:100%;background:var(--s2);border:1px solid var(--bord);border-radius:10px;padding:9px 12px 9px 36px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;}
.swrap input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(0,212,255,.08);}
.swrap input::placeholder{color:var(--muted);}
.swrap::before{content:'⌕';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none;}
.vbtn{background:var(--s2);border:1px solid var(--bord);border-radius:8px;padding:8px 11px;font-size:14px;cursor:pointer;color:var(--muted);transition:all .2s;}
.vbtn.on{background:rgba(0,212,255,.12);border-color:var(--ac);color:var(--ac);}
.tabs{display:flex;gap:5px;flex-wrap:wrap;}
.tab{background:var(--s2);border:1px solid var(--bord);border-radius:8px;padding:5px 11px;font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap;}
.tab.on,.tab:hover{background:rgba(0,212,255,.08);border-color:var(--ac);color:var(--ac);}
.tab .cnt{background:rgba(0,212,255,.15);color:var(--ac);border-radius:10px;padding:1px 6px;font-size:9px;margin-left:3px;}
.sort-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.sort-row label{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);}
.sort-row select{background:var(--s2);border:1px solid var(--bord);border-radius:8px;padding:5px 10px;color:var(--text);font-size:11px;font-family:'DM Mono',monospace;outline:none;cursor:pointer;}
.sort-row select:focus{border-color:var(--ac);}
.sort-btn{background:var(--s2);border:1px solid var(--bord);border-radius:8px;padding:5px 11px;font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);cursor:pointer;transition:all .2s;}
.sort-btn.on{background:rgba(255,209,102,.08);border-color:var(--ac4);color:var(--ac4);}

/* ═══ CARDS ═══ */
#container{position:relative;z-index:5;padding:14px 14px 100px;}
.grid{display:grid;grid-template-columns:1fr;gap:11px;}
@media(min-width:580px){.grid{grid-template-columns:repeat(2,1fr);}}
@media(min-width:960px){.grid{grid-template-columns:repeat(3,1fr);}}
.list{display:flex;flex-direction:column;gap:4px;}

.card{background:var(--surf);border:1px solid var(--bord);border-radius:14px;padding:16px;cursor:pointer;transition:all .25s;animation:cardIn .35s ease backwards;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--ac),transparent);opacity:0;transition:opacity .2s;}
.card:hover{border-color:rgba(0,212,255,.35);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4);}
.card:hover::before{opacity:1;}
.card.cred-ativo{border-color:rgba(255,71,87,.3);box-shadow:0 0 20px rgba(255,71,87,.06);}
.card.card-novo{border-color:rgba(255,209,102,.3);box-shadow:0 0 20px rgba(255,209,102,.06);}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.ctop{display:flex;justify-content:space-between;align-items:center;gap:6px;margin-bottom:8px;}
.cid{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);background:var(--s2);padding:2px 7px;border-radius:20px;border:1px solid var(--bord);}
.cbadges{display:flex;gap:4px;align-items:center;flex-wrap:wrap;}
.fase{font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700;white-space:nowrap;font-family:'DM Mono',monospace;}
.f-pre{background:rgba(107,127,163,.15);color:#8fa0be;border:1px solid rgba(107,127,163,.3);}
.f-ini{background:rgba(255,107,53,.15);color:#ff8c63;border:1px solid rgba(255,107,53,.3);}
.f-1r{background:rgba(255,209,102,.15);color:#ffd166;border:1px solid rgba(255,209,102,.3);}
.f-2r{background:rgba(0,212,255,.12);color:#00d4ff;border:1px solid rgba(0,212,255,.25);}
.f-mat{background:rgba(124,252,132,.12);color:#7cfc84;border:1px solid rgba(124,252,132,.25);}
.badge-novo{font-size:8px;padding:2px 7px;border-radius:20px;background:rgba(255,209,102,.2);border:1px solid rgba(255,209,102,.4);color:#ffd166;font-weight:700;font-family:'DM Mono',monospace;}
.badge-cred{font-size:8px;padding:2px 7px;border-radius:20px;background:rgba(255,71,87,.2);border:1px solid rgba(255,71,87,.4);color:#ff6b6b;font-family:'DM Mono',monospace;animation:credpulse 1.8s infinite;}
@keyframes credpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,71,87,.3)}60%{box-shadow:0 0 0 5px rgba(255,71,87,0)}}

.cname{font-family:'Syne',sans-serif;font-size:12.5px;font-weight:700;line-height:1.3;margin-bottom:7px;color:#fff;}
.cmeta{font-size:10px;color:var(--ac4);font-family:'DM Mono',monospace;margin-bottom:8px;}

.ctags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
.ctag{font-size:9px;padding:2px 7px;border-radius:6px;font-family:'DM Mono',monospace;}
.ctag-a{background:rgba(0,212,255,.07);color:#7dd4f0;border:1px solid rgba(0,212,255,.15);}
.ctag-g{background:rgba(124,252,132,.07);color:#8de895;border:1px solid rgba(124,252,132,.15);}
.ctag-s{background:rgba(255,209,102,.07);color:#ffd166;border:1px solid rgba(255,209,102,.15);}

.cpl{margin-top:2px;margin-bottom:10px;padding:8px 10px;background:var(--s2);border-radius:8px;border-left:2px solid var(--ac4);}
.cpl-label{font-size:8px;color:var(--ac4);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.cpl-val{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--ac4);line-height:1;}
.cpl-sub{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}

.cmetrics{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding-top:10px;border-top:1px solid var(--bord);margin-top:4px;}
.cmet{text-align:center;}
.cmet-v{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--ac);line-height:1;}
.cmet-v.g{color:var(--ac3);}
.cmet-v.o{color:var(--ac2);}
.cmet-v.y{color:var(--ac4);}
.cmet-l{font-size:8px;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace;}

.corig{margin-top:8px;padding:7px 9px;background:var(--s2);border-radius:8px;border-left:2px solid var(--ac2);}
.corig-label{font-size:8px;color:var(--ac2);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.chip{display:inline-block;font-size:9px;background:rgba(255,107,53,.1);color:#ffaa80;border:1px solid rgba(255,107,53,.2);padding:2px 6px;border-radius:5px;margin:1px 2px 0 0;font-family:'DM Mono',monospace;}

/* ═══ LIST VIEW ═══ */
.litem{background:var(--surf);border:1px solid var(--bord);border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .2s;animation:cardIn .3s ease backwards;}
.litem:hover{border-color:rgba(0,212,255,.4);background:var(--s2);}
.litem.cred-ativo{border-color:rgba(255,71,87,.3);}
.litem.card-novo{border-color:rgba(255,209,102,.3);}
.lnum{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);min-width:22px;}
.linfo{flex:1;min-width:0;}
.lname{font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lsub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lright{display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:70px;}

/* ═══ MODAL ═══ */
.overlay{display:none;position:fixed;inset:0;background:rgba(6,10,18,.95);backdrop-filter:blur(10px);z-index:1000;overflow-y:auto;padding:0;}
.overlay.open{display:block;}
.modal{background:var(--surf);min-height:100vh;max-width:760px;margin:0 auto;border-left:1px solid var(--bord);border-right:1px solid var(--bord);}
@media(min-width:800px){.overlay{padding:20px;}.modal{min-height:auto;border-radius:18px;margin:20px auto;}}
.mhead{padding:18px 18px 0;position:sticky;top:0;background:var(--surf);z-index:10;border-bottom:1px solid var(--bord);padding-bottom:14px;}
.mback{display:flex;align-items:center;gap:7px;background:var(--s2);border:1px solid var(--bord);border-radius:8px;padding:6px 12px;color:var(--muted);font-size:12px;cursor:pointer;margin-bottom:12px;transition:all .2s;width:fit-content;}
.mback:hover{color:var(--text);border-color:var(--ac);}
.mtitle{font-family:'Syne',sans-serif;font-size:clamp(14px,4vw,20px);font-weight:800;line-height:1.2;margin-bottom:8px;color:#fff;}
.mmeta{display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.mlink{color:var(--ac);text-decoration:none;font-size:10px;font-family:'DM Mono',monospace;display:inline-flex;align-items:center;gap:3px;border:1px solid rgba(0,212,255,.25);padding:3px 9px;border-radius:6px;transition:all .2s;}
.mlink:hover{background:rgba(0,212,255,.08);}
.mbody{padding:18px;}

/* ═══ SECTIONS ═══ */
.sec{margin-bottom:24px;}
.stitle{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--ac);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.stitle::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--bord),transparent);}

/* ═══ INFO GRID ═══ */
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
@media(max-width:400px){.igrid{grid-template-columns:1fr;}}
.iblock{background:var(--s2);border:1px solid var(--bord);border-radius:10px;padding:10px 12px;}
.iblock.full{grid-column:1/-1;}
.ilabel{font-size:8px;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;}
.ival{font-size:12px;font-weight:500;line-height:1.35;}
.ival.ac{color:var(--ac);}
.ival.g{color:var(--ac3);}
.ival.o{color:var(--ac2);}
.ival.y{color:var(--ac4);}
.ival.red{color:#ff6b6b;}
.ival.mono{font-family:'DM Mono',monospace;font-size:11px;}
.ival-sub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:3px;}

/* ═══ CAPTAÇÃO TIMELINE ═══ */
.cap-timeline{display:flex;flex-direction:column;}
.cap-item{display:flex;align-items:stretch;gap:0;}
.cap-line{display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0;}
.cap-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--bord);background:var(--bg);flex-shrink:0;margin-top:4px;z-index:1;}
.cap-dot.done{background:rgba(107,127,163,.6);border-color:#6b7fa3;}
.cap-dot.current{background:var(--ac);border-color:var(--ac);box-shadow:0 0 10px rgba(0,212,255,.5);}
.cap-vline{width:2px;flex:1;background:var(--bord);margin:2px auto;}
.cap-item:last-child .cap-vline{display:none;}
.cap-content{background:var(--s2);border:1px solid var(--bord);border-radius:10px;padding:10px 13px;margin-bottom:7px;flex:1;}
.cap-content.current{background:linear-gradient(135deg,rgba(0,212,255,.09),rgba(0,212,255,.03));border-color:rgba(0,212,255,.3);}
.cap-rodada{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.cap-content.current .cap-rodada{color:var(--ac);}
.cap-valor{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--ac4);line-height:1;}
.cap-content.current .cap-valor{color:var(--ac);}
.cap-periodo{font-family:'DM Mono',monospace;font-size:10px;color:var(--ac);margin-top:4px;}
.cap-desc{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.45;}

/* ═══ CRED BOX ═══ */
.credbox{background:linear-gradient(135deg,rgba(255,107,53,.08),rgba(255,107,53,.02));border:1px solid rgba(255,107,53,.25);border-radius:12px;padding:14px;display:flex;gap:12px;align-items:flex-start;}
.credbox.ativo{background:linear-gradient(135deg,rgba(255,71,87,.12),rgba(255,71,87,.03));border-color:rgba(255,71,87,.4);}
.cred-icon{font-size:24px;flex-shrink:0;}
.credresp{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:#ff9966;margin-bottom:4px;}
.credresp.ativo{color:#ff6b6b;}
.creddesc{font-size:11px;color:var(--muted);line-height:1.55;}

/* ═══ CONTATO CARD ═══ */
.contato-box{background:linear-gradient(135deg,rgba(0,212,255,.08),rgba(0,212,255,.02));border:1px solid rgba(0,212,255,.25);border-radius:12px;padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:400px){.contato-box{grid-template-columns:1fr;}}
.contato-box.full-w{grid-template-columns:1fr;}
.contato-item{display:flex;flex-direction:column;gap:2px;}
.contato-label{font-size:8px;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;}
.contato-val{font-size:12px;font-weight:600;color:var(--text);}
.contato-val.link{color:var(--ac);text-decoration:none;}
.contato-val.link:hover{text-decoration:underline;}
.contato-cargo{font-size:10px;color:var(--ac3);}
.contato-nota{font-size:10px;color:var(--muted);font-style:italic;margin-top:3px;grid-column:1/-1;}

/* ═══ ORIGINADORES TABLE ═══ */
.tscroll{overflow-x:auto;border-radius:10px;border:1px solid var(--bord);}
.otable{width:100%;border-collapse:collapse;min-width:520px;}
.otable th{font-size:8px;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:7px 10px;text-align:left;border-bottom:1px solid var(--bord);white-space:nowrap;}
.otable td{font-size:11px;padding:9px 10px;border-bottom:1px solid rgba(30,45,71,.5);vertical-align:top;line-height:1.4;}
.otable tr:last-child td{border-bottom:none;}
.otable tbody tr:hover td{background:rgba(0,212,255,.02);}
.otype{font-size:9px;padding:2px 6px;border-radius:5px;font-family:'DM Mono',monospace;white-space:nowrap;}
.ot-fin{background:rgba(124,252,132,.1);color:#7cfc84;border:1px solid rgba(124,252,132,.2);}
.ot-ban{background:rgba(0,212,255,.1);color:#00d4ff;border:1px solid rgba(0,212,255,.2);}
.ot-emp{background:rgba(255,209,102,.1);color:#ffd166;border:1px solid rgba(255,209,102,.2);}
.ot-ges{background:rgba(255,107,53,.1);color:#ff6b35;border:1px solid rgba(255,107,53,.2);}
.ot-out{background:rgba(107,127,163,.1);color:#8fa0be;border:1px solid rgba(107,127,163,.2);}

/* ═══ VOLUME TABLE ═══ */
.vtable{width:100%;border-collapse:collapse;min-width:440px;}
.vtable th{font-size:8px;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;padding:6px 9px;text-align:left;border-bottom:1px solid var(--bord);}
.vtable td{font-size:11px;padding:8px 9px;border-bottom:1px solid rgba(30,45,71,.4);vertical-align:middle;}
.vtable tr:last-child td{border-bottom:none;}
.vnum{font-family:'DM Mono',monospace;font-size:11px;color:var(--ac4);font-weight:600;}
.vnumhi{font-family:'DM Mono',monospace;font-size:11px;color:var(--ac3);font-weight:700;}
.vpct{display:inline-block;font-size:9px;background:rgba(0,212,255,.08);color:var(--ac);padding:1px 6px;border-radius:4px;font-family:'DM Mono',monospace;}
.vnota{font-size:9px;color:var(--muted);font-style:italic;padding:7px 9px;}

/* ═══ DOC STATS ═══ */
.docrow{display:flex;gap:6px;flex-wrap:wrap;}
.dcnt{background:var(--s2);border:1px solid var(--bord);border-radius:8px;padding:9px 11px;text-align:center;flex:1;min-width:55px;}
.dcn{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--ac);line-height:1;}
.dcl{font-size:8px;font-family:'DM Mono',monospace;color:var(--muted);margin-top:3px;}

/* ═══ NODATA ═══ */
.nodata{text-align:center;padding:60px 20px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;}

/* ═══ LEGEND ═══ */
.legend{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--bord);padding:8px 14px;display:flex;gap:10px;flex-wrap:wrap;z-index:100;justify-content:center;}
.legitem{display:flex;align-items:center;gap:4px;font-size:9px;font-family:'DM Mono',monospace;color:var(--muted);}
.legdot{width:7px;height:7px;border-radius:50%;}
</style>
</head>
<body>

<header>
  <div class="hrow">
    <div>
      <h1>FIDC Crédito Privado</h1>
      <div class="hsub">RADAR DE MERCADO · FUNDOS.NET B3/CVM · ATUALIZADO MAR/2026</div>
      <div class="hpills">
        <div class="pill"><span class="dot-live"></span> 28 FUNDOS MAPEADOS</div>
        <div class="pill">SEM ITAÚ · SEM BRADESCO</div>
        <div class="pill red">🔴 8 CAPTANDO ORIGINADORES</div>
        <div class="pill yellow">🆕 3 NOVOS 2025–2026</div>
      </div>
    </div>
    <div class="hstats">

// ─── HELPERS ───────────────────────────────────────────────────
const FL={pre:'⏸ Pré-op',ini:'🌱 Início','1r':'🔄 1ª Rodada','2r':'📈 2ª Rodada',mat:'✅ Maduro'};
const FC={pre:'f-pre',ini:'f-ini','1r':'f-1r','2r':'f-2r',mat:'f-mat'};
const TC={fin:'ot-fin',ban:'ot-ban',emp:'ot-emp',ges:'ot-ges',out:'ot-out'};
const TL={fin:'fintech',ban:'banco',emp:'empresa',ges:'gestora',out:'outros'};
function fmtD(d){if(!d||d==='—')return'—';const[y,m]=d.split('-');const M=['','jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];return`${M[parseInt(m)||0]}/${y}`;}
function ano(d){return d?parseInt(d):0;}

let view='grid',filter='todos',sortNew=true;

function getFiltered(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const af=document.getElementById('filtro-ano').value;
  return F.filter(f=>{
    const src=[f.nome,f.admin,f.gestor,f.segmento,...f.originadores.map(o=>o.nome+' '+o.seg),f.cred_desc].join(' ').toLowerCase();
    const mq=!q||src.includes(q);
    const fa=ano(f.data.substring(0,4));
    const ma=!af||(af==='2018'?fa<=2018:af==='2025'?fa>=2025:fa===parseInt(af));
    const mf=filter==='todos'||(filter==='cred-ativo'&&f.cred_ativo)||(filter==='com-orig'&&f.originadores.length>0)||(filter==='novos'&&f.data>='2025-09')||(filter==='ini'&&f.fase==='ini')||(filter==='cap'&&(f.fase==='1r'||f.fase==='2r'))||(filter==='mat'&&f.fase==='mat');
    return mq&&ma&&mf;
  }).sort((a,b)=>sortNew?b.data.localeCompare(a.data):a.data.localeCompare(b.data));
}

function setView(v){view=v;document.getElementById('bg').classList.toggle('on',v==='grid');document.getElementById('bl').classList.toggle('on',v==='list');render();}
function setFilter(f,btn){filter=f;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn&&btn.classList.add('on');render();}
function toggleSort(){sortNew=!sortNew;const b=document.getElementById('sbtn');b.textContent=sortNew?'📅 Mais Novos':'📅 Mais Antigos';b.classList.toggle('on',!sortNew);render();}

function render(){
  const funds=getFiltered();
  document.getElementById('cnt').textContent=funds.length;
  const el=document.getElementById('list');
  if(!funds.length){el.className='';el.innerHTML='<div class="nodata">🔍 Nenhum fundo encontrado</div>';return;}
  el.className=view==='grid'?'grid':'list';
  el.innerHTML=funds.map((f,i)=>{
    const isNovo=f.data>='2025-09';
    const pl=f.captacao.find(c=>c.atual);
    const d=`${(i*.03).toFixed(2)}s`;
    if(view==='grid') return `
<div class="card${isNovo?' card-novo':''}${f.cred_ativo?' cred-ativo':''}" onclick="openModal(${f.id})" style="animation-delay:${d}">
  <div class="ctop">
    <span class="cid">ID ${f.id}</span>
    <div class="cbadges">
      <span class="fase ${FC[f.fase]}">${FL[f.fase]}</span>
      ${isNovo?'<span class="badge-novo">🆕 NOVO</span>':''}
      ${f.cred_ativo?'<span class="badge-cred">🔴 Captando</span>':''}
    </div>
  </div>
  <div class="cname">${f.nome}</div>
  <div class="cmeta">📅 ${fmtD(f.data)} · ${f.originadores.length} orig.</div>
  <div class="ctags">
    ${f.admin&&f.admin!=='A confirmar'?`<span class="ctag ctag-a">🏦 ${f.admin.substring(0,24)}</span>`:''}
    ${f.gestor?`<span class="ctag ctag-g">⚙ ${f.gestor.substring(0,20)}</span>`:''}
    ${f.segmento?`<span class="ctag ctag-s">${f.segmento.substring(0,22)}</span>`:''}
  </div>
  ${pl?`<div class="cpl"><div class="cpl-label">Saldo / PL Atual</div><div class="cpl-val">${pl.v}</div><div class="cpl-sub">${pl.p} · ${f.captacao.filter(c=>!c.atual).length} rod.</div></div>`:''}
  <div class="cmetrics">
    <div class="cmet"><div class="cmet-v ${f.total_docs>30?'g':''}">${f.total_docs}</div><div class="cmet-l">DOCS</div></div>
    <div class="cmet"><div class="cmet-v o">${f.originadores.length}</div><div class="cmet-l">ORIG.</div></div>
    <div class="cmet"><div class="cmet-v">${f.n_inf}</div><div class="cmet-l">INFORM.</div></div>
    <div class="cmet"><div class="cmet-v y">${f.captacao.length}</div><div class="cmet-l">RODADAS</div></div>
  </div>
  ${f.originadores.length>0?`<div class="corig"><div class="corig-label">Originadores</div>${f.originadores.slice(0,2).map(o=>`<span class="chip">${o.nome.substring(0,26)}</span>`).join('')}${f.originadores.length>2?`<span class="chip">+${f.originadores.length-2}</span>`:''}</div>`:''}
</div>`;
    return `<div class="litem${isNovo?' card-novo':''}${f.cred_ativo?' cred-ativo':''}" onclick="openModal(${f.id})" style="animation-delay:${d}">
  <div class="lnum">${i+1}</div>
  <div class="linfo"><div class="lname">${isNovo?'🆕 ':''}${f.cred_ativo?'🔴 ':''}${f.nome}</div><div class="lsub">📅 ${fmtD(f.data)} · ${f.gestor||'—'}</div></div>
  <div class="lright"><span class="fase ${FC[f.fase]}">${FL[f.fase]}</span><span style="font-size:9px;color:var(--muted);font-family:'DM Mono'">${f.originadores.length} orig.</span></div>
</div>`;
  }).join('');
}

function openModal(id){
  const f=F.find(x=>x.id===id);
  if(!f)return;
  const isNovo=f.data>='2025-09';

  const timeline=f.captacao.map((c,i)=>`
<div class="cap-item">
  <div class="cap-line">
    <div class="cap-dot ${c.atual?'current':'done'}"></div>
    ${i<f.captacao.length-1?'<div class="cap-vline"></div>':''}
  </div>
  <div class="cap-content ${c.atual?'current':''}">
    <div class="cap-rodada">${c.r}</div>
    <div class="cap-valor">${c.v}</div>
    <div class="cap-periodo">📅 ${c.p}</div>
    <div class="cap-desc">${c.d}</div>
  </div>
</div>`).join('');

  const origRows=f.originadores.length
    ?f.originadores.map(o=>`<tr>
  <td><strong>${o.nome}</strong></td>
  <td><span class="otype ${TC[o.tipo]||'ot-out'}">${TL[o.tipo]||o.tipo}</span></td>
  <td style="color:var(--muted);font-size:10px">${o.seg}</td>
  <td style="color:var(--muted);font-size:10px">${o.contrato}</td>
  <td style="font-family:'DM Mono';font-size:10px;color:var(--ac4)">${o.vol||'—'}</td>
  <td style="font-family:'DM Mono';font-size:10px;color:var(--muted)">${o.desde}</td>
</tr>`).join('')
    :`<tr><td colspan="6" style="color:var(--muted);text-align:center;padding:18px;font-size:11px">⚠ Originadores não identificados. Verificar regulamento ou contatar a Gestora.</td></tr>`;

  const volSec=f.vol&&f.vol.length?`
<div class="sec">
  <div class="stitle">📈 Volume de Produção por Originadora (Estimado)</div>
  <div class="tscroll">
    <table class="vtable">
      <thead><tr><th>Originadora</th><th>2023</th><th>2024</th><th>2025</th><th>% Fundo</th></tr></thead>
      <tbody>${f.vol.map(v=>`<tr>
        <td><strong>${v.o}</strong></td>
        <td class="vnum">${v.v2023}</td>
        <td class="vnum">${v.v2024}</td>
        <td class="vnumhi">${v.v2025}</td>
        <td><span class="vpct">${v.pct}</span></td>
      </tr>`).join('')}</tbody>
    </table>
    <div class="vnota">* Volumes estimados com base em informes periódicos CVM e dados públicos. Não constituem informação oficial.</div>
  </div>
</div>`:'';

  const ct=f.contato||{};
  const contatoSec=`
<div class="sec">
  <div class="stitle">📞 Contato para Credenciamento de Originadores</div>
  <div class="contato-box${!ct.email||ct.email==='—'?' full-w':''}">
    <div class="contato-item">
      <span class="contato-label">Responsável pelo Credenciamento</span>
      <span class="contato-val">${ct.responsavel||'—'}</span>
      <span class="contato-cargo">${ct.cargo||'—'}</span>
    </div>
    <div class="contato-item">
      <span class="contato-label">Contato</span>
      ${ct.email&&ct.email!=='—'?`<a class="contato-val link" href="mailto:${ct.email}">${ct.email}</a>`:'<span class="contato-val" style="color:var(--muted)">Não divulgado</span>'}
      ${ct.site&&ct.site!=='—'?`<a class="contato-val link" href="https://${ct.site}" target="_blank" style="font-size:11px">${ct.site}</a>`:''}
    </div>
    <div class="contato-item full-w" style="grid-column:1/-1">
      <span class="contato-label">Endereço</span>
      <span class="contato-val" style="font-size:11px;color:var(--muted)">${ct.endereco||'—'}</span>
    </div>
    <div class="contato-item" style="grid-column:1/-1;background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.15);border-radius:8px;padding:8px 10px">
      <span class="contato-label">Nota</span>
      <span class="contato-val" style="font-size:11px;color:${f.cred_ativo?'#ff6b6b':'var(--ac3)'}">${ct.nota||'—'}</span>
    </div>
  </div>
</div>`;

  document.getElementById('mc').innerHTML=`
<div class="mhead">
  <button class="mback" onclick="closeModal()">← Voltar</button>
  <div class="mtitle">${isNovo?'🆕 ':''}${f.nome}</div>
  <div class="mmeta">
    <span class="fase ${FC[f.fase]}">${FL[f.fase]}</span>
    <span class="cid">ID ${f.id}</span>
    <span class="cid">📅 ${fmtD(f.data)}</span>
    ${f.cnpj&&f.cnpj!=='—'?`<span class="cid">${f.cnpj}</span>`:''}
    ${isNovo?'<span class="badge-novo">🆕 NOVO 2025-2026</span>':''}
    ${f.cred_ativo?'<span class="badge-cred">🔴 Captando Originadores</span>':''}
    ${f.tem_reg&&f.url?`<a class="mlink" href="${f.url}" target="_blank">📄 Fundos.NET ↗</a>`:''}
  </div>
</div>
<div class="mbody">

  <div class="sec">
    <div class="stitle">🏛 Prestadores de Serviços Essenciais</div>
    <div class="igrid">
      <div class="iblock">
        <div class="ilabel">Administradora</div>
        <div class="ival ac">${f.admin||'—'}</div>
        ${f.admin_cnpj&&f.admin_cnpj!=='—'?`<div class="ival-sub">CNPJ: ${f.admin_cnpj}</div>`:''}
      </div>
      <div class="iblock">
        <div class="ilabel">Gestora ⭐ (credencia originadores)</div>
        <div class="ival g">${f.gestor||'—'}</div>
        ${f.gestor_cnpj&&f.gestor_cnpj!=='—'?`<div class="ival-sub">CNPJ: ${f.gestor_cnpj}</div>`:''}
      </div>
      <div class="iblock">
        <div class="ilabel">Custodiante</div>
        <div class="ival">${f.custodiante||'—'}</div>
      </div>
      <div class="iblock">
        <div class="ilabel">Segmento</div>
        <div class="ival y" style="font-size:11px">${f.segmento||'—'}</div>
      </div>
      <div class="iblock">
        <div class="ilabel">Séries / Cotas</div>
        <div class="ival" style="font-size:11px">${f.series||'—'}</div>
      </div>
      <div class="iblock">
        <div class="ilabel">Prazo / CNPJ Fundo</div>
        <div class="ival" style="font-size:11px">${f.prazo||'—'}</div>
        ${f.cnpj&&f.cnpj!=='—'?`<div class="ival-sub">CNPJ: ${f.cnpj}</div>`:''}
      </div>
    </div>
  </div>

  <div class="sec">
    <div class="stitle">📅 Jornada de Captação de Recursos</div>
    <div class="cap-timeline">${timeline}</div>
  </div>

  <div class="sec">
    <div class="stitle">🔑 Quem Credencia Originadores</div>
    <div class="credbox ${f.cred_ativo_flag?'ativo':''}">
      <div class="cred-icon">${f.cred_ativo_flag?'🔴':'🔑'}</div>
      <div>
        <div class="credresp ${f.cred_ativo_flag?'ativo':''}">${f.cred_resp}</div>
        <div class="creddesc">${f.cred_desc}</div>
      </div>
    </div>
  </div>

  ${contatoSec}

  <div class="sec">
    <div class="stitle">🤝 Originadores / Cedentes Contratados</div>
    <div class="tscroll">
      <table class="otable">
        <thead><tr><th>Originador / Cedente</th><th>Tipo</th><th>Segmento</th><th>Contrato</th><th>Vol. Anual</th><th>Desde</th></tr></thead>
        <tbody>${origRows}</tbody>
      </table>
    </div>
  </div>

  ${volSec}

  <div class="sec">
    <div class="stitle">📊 Atividade Fundos.NET</div>
    <div class="docrow">
      <div class="dcnt"><div class="dcn">${f.total_docs}</div><div class="dcl">Total Docs</div></div>
      <div class="dcnt"><div class="dcn" style="color:var(--ac3)">${f.n_reg}</div><div class="dcl">Regulamentos</div></div>
      <div class="dcnt"><div class="dcn" style="color:var(--ac4)">${f.n_inf}</div><div class="dcl">Informes</div></div>
      <div class="dcnt"><div class="dcn" style="color:var(--ac2)">${f.n_ato}</div><div class="dcl">Atos</div></div>
    </div>
    ${f.ultima&&f.ultima!=='—'?`<div style="margin-top:8px;font-size:10px;color:var(--muted);font-family:'DM Mono'">Última entrega: ${fmtD(f.ultima)}</div>`:''}
  </div>

  <div class="sec">
    <div class="stitle">📝 Observações</div>
    <div class="iblock full"><div class="ival" style="font-size:11px;line-height:1.6;color:var(--muted)">${f.obs||'—'}</div></div>
  </div>

</div>`;

  document.getElementById('ov').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('ov').classList.remove('open');
  document.body.style.overflow='';
}

document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
render();
</script>
</body>
</html>
